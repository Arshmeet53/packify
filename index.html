<!DOCTYPE html>
<html>
<head>
  <title>Packify App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    /* LOGIN PAGE */
    #loginPage {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 220px;
    }

    .btn {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    /* DASHBOARD */
    #dashboard {
      display: none;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: #eee;
    }

    .logout {
      background: red;
      padding: 8px 12px;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* SECTIONS */
    #sectionView {
      display: none;
      padding: 20px;
    }

    .back {
      background: black;
      color: white;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Packify Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <header>
    <h2>Packify Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </header>

  <div class="container">

    <div class="card" onclick="openSection('orders')">
      <h3>📦 Orders</h3>
      <p>Click to view orders</p>
    </div>

    <div class="card" onclick="openSection('shipping')">
      <h3>🚚 Shipping</h3>
      <p>Click to track shipments</p>
    </div>

    <div class="card" onclick="openSection('analytics')">
      <h3>📊 Analytics</h3>
      <p>View performance data</p>
    </div>

    <div class="card" onclick="openSection('settings')">
      <h3>⚙ Settings</h3>
      <p>Manage account</p>
    </div>

  </div>
</div>

<!-- SECTION VIEW -->
<div id="sectionView">
  <button class="back" onclick="back()">⬅ Back</button>
  <h2 id="sectionTitle"></h2>
  <p id="sectionContent"></p>
</div>

<script>
  function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user && pass) {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    } else {
      alert("Enter username & password");
    }
  }

  function logout() {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("sectionView").style.display = "none";
  }

  function openSection(page) {
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("sectionView").style.display = "block";

    let title = "";
    let content = "";

    if(page === "orders") {
      title = "📦 Orders";
      content = "You currently have no active orders.";
    }
    if(page === "shipping") {
      title = "🚚 Shipping";
      content = "No shipments are active right now.";
    }
    if(page === "analytics") {
      title = "📊 Analytics";
      content = "Sales and performance data will appear here.";
    }
    if(page === "settings") {
      title = "⚙ Settings";
      content = "Manage your account settings here.";
    }

    document.getElementById("sectionTitle").innerText = title;
    document.getElementById("sectionContent").innerText = content;
  }

  function back() {
    document.getElementById("sectionView").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }
</script>

</body>
</html>
