<!DOCTYPE html>
<html>
<head>
  <title>Packify App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    /* LOGIN PAGE */
    #loginPage {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    .btn {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    /* DASHBOARD */
    #dashboard {
      display: none;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .logout {
      background: red;
      padding: 8px 12px;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Packify Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <header>
    <h2>Packify Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </header>

  <div class="container">

    <div class="card">
      <h3>📦 Orders</h3>
      <p>You have 0 active orders</p>
    </div>

    <div class="card">
      <h3>🚚 Shipping</h3>
      <p>No shipments yet</p>
    </div>

    <div class="card">
      <h3>📊 Analytics</h3>
      <p>Data will appear here</p>
    </div>

    <div class="card">
      <h3>⚙ Settings</h3>
      <p>Manage your account</p>
    </div>

  </div>
</div>

<script>
  function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user && pass) {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    } else {
      alert("Enter username & password");
    }
  }

  function logout() {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  }
</script>

</body>
</html>
